apiVersion: v1
kind: ServiceAccount
metadata:
  name: cost-optimizer-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cost-optimizer-role
rules:
  # Allow viewing and modifying deployments to scale them down
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  # Allow viewing HPAs to query replica and traffic metrics
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cost-optimizer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cost-optimizer-role
subjects:
  - kind: ServiceAccount
    name: cost-optimizer-sa
    namespace: default
