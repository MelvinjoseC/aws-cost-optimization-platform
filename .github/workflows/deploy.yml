name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Unit Tests with Pytest
        env:
          AWS_DEFAULT_REGION: us-east-1
          DRY_RUN: "true"
        run: |
          pytest

  deploy:
    name: Deploy (Terraform & Lambda)
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Production DevOps practice: Use OIDC role instead of long-lived access keys
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-cost-optimizer-deploy
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Format & Check
        run: terraform -cwd terraform fmt -check

      - name: Terraform Init
        run: terraform -cwd terraform init

      - name: Terraform Validate
        run: terraform -cwd terraform validate

      - name: Terraform Plan
        run: terraform -cwd terraform plan -var="s3_bucket_name=aws-cost-optimization-reports-123456789012" -out=tfplan

      - name: Terraform Apply
        run: terraform -cwd terraform apply -auto-approve tfplan
